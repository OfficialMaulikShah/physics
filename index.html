<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damped · Driven Oscillator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f5f2;
    --panel:    #ffffff;
    --border:   #e0e0da;
    --text:     #444;
    --muted:    #888;
    --spring:   #0F6E56;
    --block:    #185FA5;
    --blockfill:#ddeeff;
    --force:    #993C1D;
    --eq:       #c0e0d0;
    --eqtext:   #6aad90;
    --curve:    #854F0B;
    --grid:     #ebebeb;
    --center:   #d0e8d0;
    --badge-u-bg: #E6F1FB; --badge-u-c: #185FA5; --badge-u-b: #B5D4F4;
    --badge-o-bg: #FCEBEB; --badge-o-c: #A32D2D; --badge-o-b: #F7C1C1;
    --badge-c-bg: #FAEEDA; --badge-c-c: #854F0B; --badge-c-b: #FAC775;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #111;
      --panel:    #1a1a1a;
      --border:   #2e2e2e;
      --text:     #ccc;
      --muted:    #666;
      --spring:   #5DCAA5;
      --block:    #85B7EB;
      --blockfill:#162840;
      --force:    #F0997B;
      --eq:       #2a4a3a;
      --eqtext:   #4a8a6a;
      --curve:    #EF9F27;
      --grid:     #252525;
      --center:   #2a3a2a;
      --badge-u-bg:#0C447C; --badge-u-c:#B5D4F4; --badge-u-b:#185FA5;
      --badge-o-bg:#791F1F; --badge-o-c:#F7C1C1; --badge-o-b:#A32D2D;
      --badge-c-bg:#633806; --badge-c-c:#FAC775; --badge-c-b:#854F0B;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }

  .root {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Header ── */
  .hdr {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .title {
    font-size: 12px;
    font-weight: bold;
    color: var(--muted);
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .reads {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .reads b { color: var(--text); font-weight: bold; }
  .badge {
    margin-left: auto;
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 6px;
    border: 1px solid;
    white-space: nowrap;
  }
  .bu { background: var(--badge-u-bg); color: var(--badge-u-c); border-color: var(--badge-u-b); }
  .bo { background: var(--badge-o-bg); color: var(--badge-o-c); border-color: var(--badge-o-b); }
  .bc { background: var(--badge-c-bg); color: var(--badge-c-c); border-color: var(--badge-c-b); }

  /* ── Canvas panels ── */
  .cw {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  .cw canvas { display: block; width: 100%; height: 100%; }
  .cwl {
    position: absolute; top: 7px; left: 12px;
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .1em;
    pointer-events: none;
  }
  .aw { height: 200px; }
  .gw { height: 160px; }

  /* ── Controls ── */
  .ctrls {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: flex-end;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .cg { flex: 1; min-width: 180px; }
  .cg > div {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .csym { font-style: italic; font-weight: bold; color: var(--text); font-size: 14px; width: 14px; }
  .cval { font-weight: bold; color: var(--text); min-width: 40px; text-align: right; margin-left: auto; }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--text);
    border-radius: 50%;
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: var(--text);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }

  button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: .1em;
    padding: 7px 14px;
    cursor: pointer;
    border-radius: 6px;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
  }
  button:hover { border-color: var(--text); color: var(--text); }

  /* ── Info chips ── */
  .infos { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 11px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
  }
  .chip b { color: var(--text); font-weight: bold; }
</style>
</head>
<body>
<div class="root">

  <div class="hdr">
    <span class="title">Damped · Driven Oscillator</span>
    <div class="reads">
      <span>x = <b id="rx">0.000</b> m</span>
      <span>v = <b id="rv">0.000</b> m/s</span>
      <span>F = <b id="rf">1.000</b> N</span>
      <span>t = <b id="rt">0.0</b> s</span>
    </div>
    <span class="badge bu" id="regime">underdamped</span>
  </div>

  <div class="cw aw">
    <canvas id="aC"></canvas>
    <span class="cwl">spring — block system</span>
  </div>

  <div class="cw gw">
    <canvas id="gC"></canvas>
    <span class="cwl">displacement x(t)</span>
  </div>

  <div class="ctrls">
    <div class="cg">
      <div>
        <span class="csym">b</span>
        <span>Damping coefficient</span>
        <span class="cval" id="vB">0.50</span>
      </div>
      <input type="range" id="sB" min="0" max="5" step="0.05" value="0.5">
    </div>
    <div class="cg">
      <div>
        <span class="csym">ω</span>
        <span>Driving frequency (rad/s)</span>
        <span class="cval" id="vW">2.00</span>
      </div>
      <input type="range" id="sW" min="0" max="6" step="0.05" value="2">
    </div>
    <button id="rBtn">↺ reset</button>
  </div>

  <div class="infos">
    <span class="chip">ω₀ = <b>2.00</b> rad/s</span>
    <span class="chip">ω / ω₀ = <b id="iR">1.000</b></span>
    <span class="chip">A<sub>ss</sub> = <b id="iA">0.250</b> m</span>
    <span class="chip">m = <b>1</b> kg · k = <b>4</b> N/m · F₀ = <b>1</b> N</span>
  </div>

</div>

<script>
// ── Physics ──────────────────────────────────────
const M = 1, K = 4, F0 = 1, W0 = Math.sqrt(K / M);
let b = 0.5, w = 2;
let px = 0, pv = 0, pt = 0;
const DT = 0.005;

function deriv(x, v, t) {
  return [v, (F0 * Math.cos(w * t) - b * v - K * x) / M];
}

function step() {
  const [k1x, k1v] = deriv(px, pv, pt);
  const [k2x, k2v] = deriv(px + .5*DT*k1x, pv + .5*DT*k1v, pt + .5*DT);
  const [k3x, k3v] = deriv(px + .5*DT*k2x, pv + .5*DT*k2v, pt + .5*DT);
  const [k4x, k4v] = deriv(px + DT*k3x,    pv + DT*k3v,    pt + DT);
  px += DT / 6 * (k1x + 2*k2x + 2*k3x + k4x);
  pv += DT / 6 * (k1v + 2*k2v + 2*k3v + k4v);
  pt += DT;
}

// ── History buffer ────────────────────────────────
const HLEN = 1200;
const hx = new Float32Array(HLEN), ht = new Float32Array(HLEN);
let hi = 0, hc = 0;

function record() {
  hx[hi] = px; ht[hi] = pt;
  hi = (hi + 1) % HLEN;
  if (hc < HLEN) hc++;
}

// ── Canvas setup ──────────────────────────────────
const aC = document.getElementById('aC');
const gC = document.getElementById('gC');
const ax = aC.getContext('2d');
const gx = gC.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resize() {
  [aC, gC].forEach(c => {
    c.width  = c.offsetWidth  * dpr;
    c.height = c.offsetHeight * dpr;
  });
}

// Read CSS variables for dark-mode-aware colors
function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}
function C() {
  return {
    grid:       cssVar('--grid'),
    spring:     cssVar('--spring'),
    blockFill:  cssVar('--blockfill'),
    blockLine:  cssVar('--block'),
    force:      cssVar('--force'),
    eq:         cssVar('--eq'),
    eqText:     cssVar('--eqtext'),
    curve:      cssVar('--curve'),
    center:     cssVar('--center'),
    muted:      cssVar('--muted'),
    wall:       cssVar('--muted'),
    wallFill:   cssVar('--border'),
  };
}

// ── Draw spring zigzag ────────────────────────────
function drawSpring(ctx, x1, x2, cy, coils, h) {
  const n = coils * 2, d = (x2 - x1) / (n + 2);
  ctx.beginPath();
  ctx.moveTo(x1, cy);
  ctx.lineTo(x1 + d, cy);
  for (let i = 0; i < n; i++)
    ctx.lineTo(x1 + d + (i + 1) * d, cy + (i % 2 === 0 ? -h : h));
  ctx.lineTo(x2, cy);
  ctx.stroke();
}

// ── Animation canvas ──────────────────────────────
function drawAnim() {
  const W = aC.width, H = aC.height, c = C();
  ax.clearRect(0, 0, W, H);

  // Grid
  ax.strokeStyle = c.grid;
  ax.lineWidth = 1;
  for (let x = 0; x < W; x += 20 * dpr) { ax.beginPath(); ax.moveTo(x, 0); ax.lineTo(x, H); ax.stroke(); }
  for (let y = 0; y < H; y += 20 * dpr) { ax.beginPath(); ax.moveTo(0, y); ax.lineTo(W, y); ax.stroke(); }

  const cy   = H * 0.54;
  const wallX = 38 * dpr;
  const eqX   = W * 0.40;
  const sc    = 70 * dpr;   // pixels per metre
  const bw    = 52 * dpr, bh = 44 * dpr;

  // Clamp block to canvas
  const bx = Math.max(wallX + 10 * dpr, Math.min(W - bw - 12 * dpr, eqX + px * sc));

  // Wall
  ax.fillStyle = c.wallFill;
  ax.fillRect(wallX - 8 * dpr, cy - 40 * dpr, 8 * dpr, 80 * dpr);
  ax.strokeStyle = c.wall;
  ax.lineWidth = 1.5 * dpr;
  for (let i = -3; i <= 3; i++) {
    ax.beginPath();
    ax.moveTo(wallX - 14 * dpr, cy + i * 12 * dpr - 4 * dpr);
    ax.lineTo(wallX - 8  * dpr, cy + i * 12 * dpr + 4 * dpr);
    ax.stroke();
  }

  // Track
  ax.strokeStyle = c.wallFill;
  ax.lineWidth = 2 * dpr;
  ax.beginPath();
  ax.moveTo(wallX, cy + bh * 0.5 + 4 * dpr);
  ax.lineTo(W - 16 * dpr, cy + bh * 0.5 + 4 * dpr);
  ax.stroke();

  // Equilibrium dashed line
  ax.strokeStyle = c.eq;
  ax.lineWidth = 1 * dpr;
  ax.setLineDash([3 * dpr, 5 * dpr]);
  ax.beginPath();
  ax.moveTo(eqX + bw * 0.5, cy - 42 * dpr);
  ax.lineTo(eqX + bw * 0.5, cy + bh * 0.5 + 3 * dpr);
  ax.stroke();
  ax.setLineDash([]);
  ax.fillStyle = c.eqText;
  ax.font = `${9 * dpr}px 'Courier New', monospace`;
  ax.textAlign = 'center';
  ax.textBaseline = 'bottom';
  ax.fillText('x = 0', eqX + bw * 0.5, cy - 44 * dpr);

  // Spring
  ax.strokeStyle = c.spring;
  ax.lineWidth = 2 * dpr;
  drawSpring(ax, wallX, bx, cy - bh * 0.15, 8, 12 * dpr);

  // Block
  ax.fillStyle = c.blockFill;
  ax.fillRect(bx, cy - bh * 0.5, bw, bh);
  ax.strokeStyle = c.blockLine;
  ax.lineWidth = 2 * dpr;
  ax.strokeRect(bx, cy - bh * 0.5, bw, bh);
  ax.fillStyle = c.blockLine;
  ax.font = `bold ${11 * dpr}px 'Courier New', monospace`;
  ax.textAlign = 'center';
  ax.textBaseline = 'middle';
  ax.fillText('m', bx + bw * 0.5, cy - 1 * dpr);

  // Driving force arrow
  const force = F0 * Math.cos(w * pt);
  const al = force * 30 * dpr;
  if (Math.abs(al) > 4) {
    const aY = cy - bh * 0.92, aX = bx + bw * 0.5, aE = aX + al, dir = Math.sign(al);
    ax.strokeStyle = c.force;
    ax.fillStyle   = c.force;
    ax.lineWidth   = 2 * dpr;
    ax.beginPath(); ax.moveTo(aX, aY); ax.lineTo(aE, aY); ax.stroke();
    ax.beginPath();
    ax.moveTo(aE, aY);
    ax.lineTo(aE - dir * 8 * dpr, aY - 4.5 * dpr);
    ax.lineTo(aE - dir * 8 * dpr, aY + 4.5 * dpr);
    ax.closePath();
    ax.fill();
    ax.font = `${9 * dpr}px 'Courier New', monospace`;
    ax.textAlign = dir > 0 ? 'left' : 'right';
    ax.textBaseline = 'middle';
    ax.fillText('F(t)', aE + dir * 10 * dpr, aY);
  }
}

// ── Graph canvas ──────────────────────────────────
function drawGraph() {
  const W = gC.width, H = gC.height, c = C();
  gx.clearRect(0, 0, W, H);
  if (hc < 2) return;

  const pL = 34 * dpr, pR = 12 * dpr, pT = 14 * dpr, pB = 22 * dpr;
  const pw = W - pL - pR, ph = H - pT - pB;

  // Grid
  gx.strokeStyle = c.grid;
  gx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = pT + (i / 5) * ph;
    gx.beginPath(); gx.moveTo(pL, y); gx.lineTo(pL + pw, y); gx.stroke();
  }
  for (let i = 0; i <= 6; i++) {
    const x = pL + (i / 6) * pw;
    gx.beginPath(); gx.moveTo(x, pT); gx.lineTo(x, pT + ph); gx.stroke();
  }

  // Centre (x = 0) line
  const cy2 = pT + ph * 0.5;
  gx.strokeStyle = c.center;
  gx.lineWidth = 1 * dpr;
  gx.setLineDash([3 * dpr, 5 * dpr]);
  gx.beginPath(); gx.moveTo(pL, cy2); gx.lineTo(pL + pw, cy2); gx.stroke();
  gx.setLineDash([]);

  // Y labels
  const yMax = 1.5;
  gx.fillStyle = c.muted;
  gx.font = `${8 * dpr}px 'Courier New', monospace`;
  gx.textAlign = 'right';
  gx.textBaseline = 'middle';
  gx.fillText('+' + yMax, pL - 4 * dpr, pT);
  gx.fillText('0',        pL - 4 * dpr, cy2);
  gx.fillText('-' + yMax, pL - 4 * dpr, pT + ph);

  // Ordered history
  const count = Math.min(hc, HLEN);
  const xs = [], ts = [];
  for (let i = 0; i < count; i++) {
    const idx = (hi - count + i + HLEN) % HLEN;
    xs.push(hx[idx]); ts.push(ht[idx]);
  }

  const tWin = 20, tMax = ts[count - 1], tMin = tMax - tWin;
  const toSX = t => pL + ((t - tMin) / tWin) * pw;
  const toSY = x => pT + ph * 0.5 - (x / yMax) * ph * 0.5;

  // Time axis labels
  gx.textAlign = 'center'; gx.textBaseline = 'top';
  for (let i = 0; i <= 4; i++) {
    const t = tMin + (i / 4) * tWin;
    gx.fillText(t.toFixed(0) + 's', pL + (i / 4) * pw, pT + ph + 3 * dpr);
  }

  // x(t) curve
  gx.strokeStyle = c.curve;
  gx.lineWidth = 1.5 * dpr;
  gx.beginPath();
  let first = true;
  for (let i = 0; i < count; i++) {
    if (ts[i] < tMin) continue;
    const sx = toSX(ts[i]);
    const sy = Math.max(pT, Math.min(pT + ph, toSY(xs[i])));
    if (first) { gx.moveTo(sx, sy); first = false; } else gx.lineTo(sx, sy);
  }
  gx.stroke();

  // Current position dot
  const lsx = toSX(tMax);
  const lsy = Math.max(pT + 3 * dpr, Math.min(pT + ph - 3 * dpr, toSY(xs[count - 1])));
  gx.fillStyle = c.curve;
  gx.beginPath(); gx.arc(lsx, lsy, 3 * dpr, 0, Math.PI * 2); gx.fill();
}

// ── Info panel update ─────────────────────────────
function updateInfo() {
  document.getElementById('iR').textContent = (w / W0).toFixed(3);
  const denom = (K - M * w * w) ** 2 + (b * w) ** 2;
  document.getElementById('iA').textContent = denom > 1e-8
    ? (F0 / Math.sqrt(denom)).toFixed(3) : '∞';
  const bc = 2 * Math.sqrt(K * M);
  const el = document.getElementById('regime');
  if      (b < bc * 0.99) { el.textContent = 'underdamped';      el.className = 'badge bu'; }
  else if (b > bc * 1.01) { el.textContent = 'overdamped';       el.className = 'badge bo'; }
  else                    { el.textContent = 'critically damped'; el.className = 'badge bc'; }
}

// ── Slider events ─────────────────────────────────
document.getElementById('sB').addEventListener('input', function () {
  b = +this.value;
  document.getElementById('vB').textContent = b.toFixed(2);
  updateInfo();
});
document.getElementById('sW').addEventListener('input', function () {
  w = +this.value;
  document.getElementById('vW').textContent = w.toFixed(2);
  updateInfo();
});
document.getElementById('rBtn').addEventListener('click', () => {
  px = 0; pv = 0; pt = 0; hi = 0; hc = 0;
  hx.fill(0); ht.fill(0);
});

updateInfo();

// ── Main loop ─────────────────────────────────────
let fc = 0;
function loop() {
  for (let i = 0; i < 3; i++) step();
  if (fc % 2 === 0) record();
  fc++;
  document.getElementById('rx').textContent = px.toFixed(3);
  document.getElementById('rv').textContent = pv.toFixed(3);
  document.getElementById('rf').textContent = (F0 * Math.cos(w * pt)).toFixed(3);
  document.getElementById('rt').textContent = pt.toFixed(1);
  drawAnim();
  drawGraph();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { resize(); });
window.addEventListener('load',   () => { resize(); loop(); });
</script>
</body>
</html>
